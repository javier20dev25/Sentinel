- id: "go-replace-directive-hijack"
  name: "Go Module Replacement Hijack"
  category: "supply-chain"
  severity: 9
  pattern: "replace\\s+[\\w\\.\\/]+\\s+=>\\s+[\\w\\.\\/]+malicious"
  description: "Detects malicious replace directives in go.mod files"

- id: "go-exec-command-hidden"
  name: "Hidden OS Command Execution in Go"
  category: "malware"
  severity: 8
  pattern: "exec\\.Command\\([`'\"](?:sh|bash|cmd)[`'\"].*curl"
  description: "Detects potentially malicious shell executions disguised in Go packages"
