name: Sentinel PR Firewall
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sentinel-pr-scan:
    name: Sentinel Policy Enforcement
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run Sentinel PR Firewall
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          # The PR Firewall evaluates .sentinel/policies.json
          # It uses the Checks API to block the PR if 'strict' rules are violated.
          npx sentinel-security-engine pr scan ${{ github.repository }} ${{ github.event.pull_request.number }} --ci
