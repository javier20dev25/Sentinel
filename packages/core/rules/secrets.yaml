# Sentinel: Secret Detection Rules
# Each rule includes an 'example' field showing what the pattern matches (redacted).

- id: "aws-access-key"
  name: "AWS Access Key ID"
  category: "secrets"
  severity: 10
  pattern: "AKIA[0-9A-Z]{16}"
  description: "Detects exposed AWS Access Key IDs"
  example: "REDACTED_AWS_ACCESS_KEY"

- id: "github-pat-fine"
  name: "GitHub Fine-Grained Personal Access Token"
  category: "secrets"
  severity: 10
  pattern: "ghp_[A-Za-z0-9]{36}"
  description: "Detects GitHub fine-grained personal access tokens"
  example: "REDACTED_GITHUB_FINE_GRAINED_TOKEN"

- id: "github-oauth-token"
  name: "GitHub OAuth Access Token"
  category: "secrets"
  severity: 10
  pattern: "gho_[A-Za-z0-9]{36}"
  description: "Detects GitHub OAuth access tokens"
  example: "REDACTED_GITHUB_OAUTH_TOKEN"

- id: "github-app-token"
  name: "GitHub App Installation Token"
  category: "secrets"
  severity: 10
  pattern: "ghs_[A-Za-z0-9]{36}"
  description: "Detects GitHub App installation tokens used for server-to-server auth"
  example: "REDACTED_GITHUB_APP_TOKEN"

- id: "openai-api-key"
  name: "OpenAI API Key"
  category: "secrets"
  severity: 10
  pattern: "sk-proj-[A-Za-z0-9]{20,}"
  description: "Detects OpenAI project API keys (sk-proj-...)"
  example: "REDACTED_OPENAI_PROJECT_KEY"

- id: "openai-legacy-key"
  name: "OpenAI Legacy API Key"
  category: "secrets"
  severity: 10
  pattern: "sk-[A-Za-z0-9]{48}"
  description: "Detects legacy OpenAI API keys (sk-...)"
  example: "REDACTED_OPENAI_LEGACY_KEY"

- id: "stripe-secret-key"
  name: "Stripe Secret Key"
  category: "secrets"
  severity: 10
  pattern: "sk_live_[A-Za-z0-9]{24,}"
  description: "Detects Stripe live secret keys"
  example: "REDACTED_STRIPE_LIVE_KEY"

- id: "stripe-test-key"
  name: "Stripe Test Key"
  category: "secrets"
  severity: 6
  pattern: "sk_test_[A-Za-z0-9]{24,}"
  description: "Detects Stripe test secret keys (lower risk but still a leak)"
  example: "REDACTED_STRIPE_TEST_KEY"

- id: "google-api-key"
  name: "Google API Key"
  category: "secrets"
  severity: 9
  pattern: "AIza[0-9A-Za-z_-]{35}"
  description: "Detects Google Cloud / Firebase / Maps API keys"
  example: "REDACTED_GOOGLE_API_KEY"

- id: "discord-bot-token"
  name: "Discord Bot Token"
  category: "secrets"
  severity: 10
  pattern: "[MN][A-Za-z0-9]{23,}\\.[A-Za-z0-9_-]{6}\\.[A-Za-z0-9_-]{27,}"
  description: "Detects Discord bot tokens"
  example: "REDACTED_DISCORD_BOT_TOKEN"

- id: "slack-webhook"
  name: "Slack Webhook URL"
  category: "secrets"
  severity: 9
  pattern: "https://hooks\\.slack\\.com/services/T[a-zA-Z0-9_]{8,}/B[a-zA-Z0-9_]{8,}/[a-zA-Z0-9_]{24}"
  description: "Detects hardcoded Slack incoming webhook URLs"
  example: "REDACTED_SLACK_INCOMING_WEBHOOK"

- id: "private-key-block"
  name: "Private Key (RSA/SSH/PGP)"
  category: "secrets"
  severity: 10
  pattern: "-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----"
  description: "Detects embedded private keys in source code"
  example: "REDACTED_PRIVATE_KEY_BLOCK"

- id: "jwt-bearer-token"
  name: "JWT / Bearer Token"
  category: "secrets"
  severity: 8
  pattern: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
  description: "Detects hardcoded JWT tokens (three base64url segments separated by dots)"
  example: "REDACTED_JWT_BEARER_TOKEN"

- id: "mongodb-connection-string"
  name: "MongoDB Connection String"
  category: "secrets"
  severity: 9
  pattern: "mongodb\\+srv://[^\\s]+"
  description: "Detects MongoDB Atlas connection strings with embedded credentials"
  example: "REDACTED_MONGODB_CONNECTION_STRING"

- id: "env-file-secrets"
  name: "Hardcoded .env Secrets"
  category: "secrets"
  severity: 9
  pattern: "(DB_PASSWORD|SECRET_KEY|API_SECRET|PRIVATE_KEY|DATABASE_URL)\\s*=\\s*['\"]?[^\\s'\"]{8,}"
  description: "Detects environment variable assignments with sensitive values"
  example: "REDACTED_ENV_FILE_SECRET"

- id: "supabase-service-key"
  name: "Supabase Service Role Key"
  category: "secrets"
  severity: 10
  pattern: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\\.[A-Za-z0-9_-]{50,}"
  description: "Detects Supabase service role keys (full admin access)"
  example: "REDACTED_SUPABASE_SERVICE_KEY"

- id: "anthropic-api-key"
  name: "Anthropic (Claude) API Key"
  category: "secrets"
  severity: 10
  pattern: "sk-ant-[A-Za-z0-9_-]{20,}"
  description: "Detects Anthropic Claude API keys"
  example: "REDACTED_ANTHROPIC_API_KEY"
