name: Dependency Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every day at 08:00 UTC to catch newly published CVEs
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  audit-nodejs:
    name: "Node.js Dependency Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install UI Dependencies
        run: npm ci
        working-directory: src/ui

      - name: Run Audit (Root)
        id: audit_root
        run: |
          echo "## 📦 Root Package Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --json > /tmp/audit_root.json || true
          CRITICAL=$(cat /tmp/audit_root.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat /tmp/audit_root.json | jq '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat /tmp/audit_root.json | jq '.metadata.vulnerabilities.moderate // 0')
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
        working-directory: .
        continue-on-error: true

      - name: Run Audit (UI / src/ui)
        id: audit_ui
        run: |
          echo "## 🖥️ UI Package Audit (src/ui)" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --json > /tmp/audit_ui.json || true
          CRITICAL=$(cat /tmp/audit_ui.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat /tmp/audit_ui.json | jq '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat /tmp/audit_ui.json | jq '.metadata.vulnerabilities.moderate // 0')
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "ui_critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "ui_high=$HIGH" >> $GITHUB_OUTPUT
        working-directory: src/ui
        continue-on-error: true

      - name: Comment Audit Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔒 Sentinel Dependency Security Audit\n\n';
            
            const parseAudit = (file) => {
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                const v = data.metadata?.vulnerabilities || {};
                return { critical: v.critical||0, high: v.high||0, moderate: v.moderate||0, low: v.low||0 };
              } catch { return null; }
            };
            
            const root = parseAudit('/tmp/audit_root.json');
            const ui   = parseAudit('/tmp/audit_ui.json');
            
            const fmt = (v) => v
              ? `| 🔴 Critical | ${v.critical} |\n| 🟠 High | ${v.high} |\n| 🟡 Moderate | ${v.moderate} |\n| 🔵 Low | ${v.low} |`
              : '| N/A | — |';
            
            body += `### Root (package.json)\n| Severity | Count |\n|:---|:---|\n${fmt(root)}\n\n`;
            body += `### UI (src/ui/package.json)\n| Severity | Count |\n|:---|:---|\n${fmt(ui)}\n\n`;
            
            const hasIssues = (root?.critical > 0 || root?.high > 0 || ui?.critical > 0 || ui?.high > 0);
            body += hasIssues
              ? '> ⚠️ **Action Required:** Critical or High vulnerabilities detected. Run `npm audit fix` and review `SECURITY_AUDIT.md`.'
              : '> ✅ No Critical or High severity vulnerabilities detected.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on Critical Vulnerabilities
        run: |
          ROOT_CRIT=${{ steps.audit_root.outputs.critical || 0 }}
          UI_CRIT=${{ steps.audit_ui.outputs.ui_critical || 0 }}
          if [ "$ROOT_CRIT" -gt 0 ] || [ "$UI_CRIT" -gt 0 ]; then
            echo "❌ BLOCKING BUILD: Critical vulnerabilities detected."
            exit 1
          fi
          echo "✅ No critical vulnerabilities. Build allowed."
