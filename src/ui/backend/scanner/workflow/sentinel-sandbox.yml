##
## Sentinel CI Sandbox — Workflow Template (Modo Pasivo)
##
## INSTRUCCIONES DE USO:
##   1. Copia este archivo a `.github/workflows/sentinel-sandbox.yml`
##      en cada repositorio que quieras proteger con el sandbox dinámico.
##   2. Protege la rama principal: Settings > Branches > Branch protection rules
##      → Requerir PR + "Require review from Code Owners".
##   3. Asegúrate de que NADIE pueda modificar este archivo sin un PR aprobado.
##
## QUÉ HACE ESTE WORKFLOW:
##   1. Se activa manualmente (workflow_dispatch) o vía repository_dispatch
##      (que puede disparar Sentinel CLI con la API de GitHub).
##   2. Usa Harden-Runner para auditoria de egress (conexiones salientes).
##      En repos privados sin licencia, desactiva harden-runner y usa netstat.
##   3. Ejecuta npm ci con --ignore-scripts para baseline (sin código malicioso).
##   4. Captura: diff del lockfile, archivos .wasm creados, conexiones abiertas,
##      y variables de entorno npm.
##   5. Sube todo como artefacto "sentinel-telemetry" que Sentinel CLI descarga
##      y analiza para detectar comportamientos anómalos.
##
## TELEMETRÍA CAPTURADA:
##   - /tmp/lockfile-diff.txt    → Cambios en package-lock.json post-install
##   - /tmp/wasm-files.txt       → Archivos .wasm creados en node_modules
##   - /tmp/npm-env.txt          → Variables de entorno relacionadas con npm
##   - /tmp/netstat-before.txt   → Conexiones de red antes de npm install
##   - /tmp/netstat-after.txt    → Conexiones de red después de npm install
##   - /tmp/new-files.txt        → Archivos binarios nuevos creados (find node_modules -type f)
##
## VERSIÓN: Sentinel 3.0 — Sandbox Pasivo
##

name: "🛡️ Sentinel Sandbox Analysis"

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Rama a analizar"
        required: false
        default: ""
        type: string
      debug_mode:
        description: "Activar logging detallado"
        required: false
        default: false
        type: boolean

  repository_dispatch:
    types: [sentinel-sandbox-run]

# Permisos necesarios para reportar en el PR and leer el código
permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  sentinel-sandbox:
    name: "Sentinel Dynamic Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "🔒 Habilitar monitoreo de red (Harden-Runner)"
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443

      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.head_ref || github.ref_name }}
          fetch-depth: 1

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "🧬 Setup Sentinel X-Ray Toolkit & Profile Spoofing"
        run: |
          # 1. Profile Locale Spoofing based on SENTINEL_SANDBOX_PROFILE
          PROFILE="${SENTINEL_SANDBOX_PROFILE:-safe}"
          if [ "$PROFILE" = "aggressive" ] || [ "$PROFILE" = "evasion-detect" ]; then
            echo "TZ=Europe/Moscow" >> $GITHUB_ENV
            echo "LANG=ru_RU.UTF-8" >> $GITHUB_ENV
            echo "LC_ALL=ru_RU.UTF-8" >> $GITHUB_ENV
            echo "[SENTINEL] Active Profile: $PROFILE (Spoofing TZ/LANG to RU)"
          else
            echo "TZ=UTC" >> $GITHUB_ENV
            echo "[SENTINEL] Active Profile: Safe (No spoofing)"
          fi

          # 2. Inject X-Ray Hooking Engine
          cat << 'EOF' > /tmp/sentinel-xray.js
          const originalEval = global.eval;
          global.eval = function (code) {
              console.log("\n[SENTINEL-XRAY] 🚨 INTERCEPTED EVAL PAYLOAD 🚨");
              console.log(code, "\n");
              return originalEval(code);
          };
          const originalFunction = global.Function;
          global.Function = new Proxy(originalFunction, {
              construct(target, args) {
                  console.log("\n[SENTINEL-XRAY] 🚨 INTERCEPTED 'new Function' PAYLOAD 🚨");
                  console.log(args[args.length - 1], "\n");
                  return new target(...args);
              }
          });
          EOF
          # Export to node process
          echo "NODE_OPTIONS=--require /tmp/sentinel-xray.js" >> $GITHUB_ENV

      - name: "📸 Snapshot pre-instalación"
        run: |
          echo "=== SENTINEL PRE-INSTALL SNAPSHOT ===" > /tmp/sentinel-pre.txt
          cp package-lock.json /tmp/before-lock.json 2>/dev/null || echo "{}" > /tmp/before-lock.json
          ss -tunp 2>/dev/null > /tmp/netstat-before.txt || echo "netstat not available" > /tmp/netstat-before.txt

      - name: "📦 npm ci --ignore-scripts"
        run: |
          npm ci --ignore-scripts --no-audit | tee /tmp/npm-install-output.txt || true
        env:
          NO_COLOR: "1"

      - name: "🔍 Análisis post-instalación"
        run: |
          diff /tmp/before-lock.json package-lock.json > /tmp/lockfile-diff.txt 2>/dev/null || echo "No diff" > /tmp/lockfile-diff.txt
          ss -tunp 2>/dev/null > /tmp/netstat-after.txt || echo "netstat not available" > /tmp/netstat-after.txt
          find node_modules -name "*.wasm" -type f 2>/dev/null > /tmp/wasm-files.txt || echo "No WASM" > /tmp/wasm-files.txt
          find node_modules -type f -executable -not -name "*.sh" 2>/dev/null | head -50 > /tmp/executables.txt || echo "No Execs" > /tmp/executables.txt

      - name: "📤 Subir telemetría Sentinel"
        uses: actions/upload-artifact@v4
        with:
          name: "sentinel-telemetry"
          path: |
            /tmp/lockfile-diff.txt
            /tmp/wasm-files.txt
            /tmp/netstat-after.txt
            /tmp/npm-install-output.txt
            /tmp/executables.txt
          retention-days: 7

      - name: "📊 Resumen de análisis"
        if: always()
        run: |
          echo "## 🛡️ Sentinel Sandbox Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| WASM Files | $(grep -v 'No WASM' /tmp/wasm-files.txt | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Executables | $(grep -v 'No Execs' /tmp/executables.txt | wc -l) |" >> $GITHUB_STEP_SUMMARY

      - name: "💬 Post Security Summary to PR & Developer Alert"
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
             const fs = require('fs');
             const wasm = fs.readFileSync('/tmp/wasm-files.txt', 'utf8').split('\n').filter(l => l.trim() && !l.includes('No WASM')).length;
             const execs = fs.readFileSync('/tmp/executables.txt', 'utf8').split('\n').filter(l => l.trim() && !l.includes('No Execs')).length;
             
             // Check X-Ray Logs for interception
             let xrayIntercepted = false;
             try {
                const logs = fs.readFileSync('/tmp/npm-install-output.txt', 'utf8');
                if (logs.includes('[SENTINEL-XRAY] 🚨 INTERCEPTED EVAL PAYLOAD 🚨') || logs.includes('INTERCEPTED OS COMMAND')) {
                  xrayIntercepted = true;
                }
             } catch(e) {}
             
             if (wasm > 0 || execs > 0 || xrayIntercepted) {
               const body = `## 🚨 Sentinel Security Alert: Active Malware Detected! 🚨\n\n` + 
                            `Sentinel Sandbox has detected high-risk behaviors in this Pull Request.\n\n` +
                            `> [!CAUTION]\n` +
                            `> **DO NOT** test this PR locally. Proceeding may compromise your local environment.\n\n` +
                            `**Threat Telemetry:**\n` +
                            `- X-Ray Engine Interception: ${xrayIntercepted ? '🔥 YES (Obfuscation Payload Decrypted)' : 'No'}\n` +
                            `- WASM Binaries Found: ${wasm}\n` +
                            `- Executables Found: ${execs}\n\n` +
                            `*This is an automated message triggered by Sentinel X-Ray Sandbox.*`;
               
               github.rest.issues.createComment({
                 issue_number: context.issue.number,
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 body: body
               });
             }
