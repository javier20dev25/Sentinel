- id: "rust-build-script-malware"
  name: "Malicious Rust Build Script (curl/wget)"
  category: "supply-chain"
  severity: 10
  pattern: 'Command::new.*sh.*-c.*curl|Command::new.*sh.*-c.*wget'
  description: "Detects build.rs executing shell commands that download remote payloads via curl or wget"

- id: "rust-build-script-env-exfil"
  name: "Env Variable Exfiltration in build.rs"
  category: "supply-chain"
  severity: 9
  pattern: 'Command::new.*sh.*-c.*env|std::env::var.*SECRET|std::env::var.*TOKEN|std::env::var.*KEY'
  description: "Detects build scripts accessing sensitive environment variables (tokens, secrets, API keys)"

- id: "cargo-registry-override"
  name: "Suspicious Cargo Registry Override"
  category: "supply-chain"
  severity: 9
  pattern: 'replace-with'
  description: "Detects hijacking of default crates.io source in .cargo/config.toml via replace-with directive"

- id: "rust-unsafe-ffi-exec"
  name: "Unsafe FFI System Execution"
  category: "malware"
  severity: 8
  pattern: 'libc::system|libc::execvp|std::process::Command::new.*rm.*-rf'
  description: "Detects unsafe FFI calls that execute system-level commands, potential for arbitrary code execution"

- id: "rust-obfuscated-include"
  name: "Obfuscated include_bytes/include_str"
  category: "obfuscation"
  severity: 7
  pattern: 'include_bytes!|include_str!'
  description: "Detects embedded binary/string payloads compiled directly into Rust binaries via include macros"

- id: "rust-network-exfiltration"
  name: "Suspicious Network Call in Build Script"
  category: "supply-chain"
  severity: 9
  pattern: 'reqwest::get|hyper::Client|TcpStream::connect'
  description: "Detects network calls in Rust code that could exfiltrate data during build or runtime"
