name: Build Sentinel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install Python setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: npm install
        working-directory: src/ui

      - name: Run Tests
        run: npm test
        working-directory: .

      - name: Build UI (Vite)
        run: npm run build
        working-directory: src/ui

      - name: Build Electron App
        run: npm run electron:build
        working-directory: src/ui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-builds
          path: |
            src/ui/dist-electron/*.exe
            src/ui/dist-electron/*.zip

      - name: Create Auto Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: "latest-build"
          name: "Sentinel Latest Build"
          body: |
            ## Download Options

            | File | Description |
            |---|---|
            | **Sentinel Setup.exe** | Windows installer (may trigger SmartScreen - click "More info" then "Run anyway") |
            | **Sentinel-win32-x64.zip** | Portable version - extract and run directly (recommended if installer is blocked) |

            ### SmartScreen Warning
            This app is not yet code-signed. Windows may show a security warning.
            Click **"More info"** then **"Run anyway"** to proceed.

            If **Smart App Control** blocks the installer, use the **portable .zip** version instead.
          files: |
            src/ui/dist-electron/*.exe
            src/ui/dist-electron/*.zip
          draft: false
          prerelease: false
